plugins {
    id 'com.android.application'
}

android {
    compileSdk 36
    namespace 'org.juanro.autumandu'

    defaultConfig {
        applicationId "org.juanro.autumandu"
        minSdk 25
        targetSdk 36
        versionCode 500
        versionName "5.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true

        javaCompileOptions {
            annotationProcessorOptions {
                arguments += ["room.schemaLocation": "$projectDir/schemas".toString()]
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // No incluir metadatos de Git en el APK final
            vcsInfo {
                include = false
            }
        }
    }

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    // JVM Toolchain para garantizar consistencia en cualquier entorno
    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    lint {
        checkReleaseBuilds false
        abortOnError false
    }

    packaging {
        resources.excludes.addAll([
                'META-INF/DEPENDENCIES',
                'META-INF/NOTICE',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE.txt',
                'META-INF/ASL2.0',
                'META-INF/*.kotlin_module',
                'META-INF/AL2.0',
                'META-INF/LGPL2.1'
        ])
        // Asegura que las librerías nativas se empaqueten de forma determinista para F-Droid
        jniLibs.useLegacyPackaging = true
    }

    dependenciesInfo {
        // Disables dependency metadata when building APKs.
        includeInApk = false
        // Disables dependency metadata when building Android App Bundles.
        includeInBundle = false
    }
}

androidComponents {
    onVariants(selector().all()) { variant ->
        variant.outputs.each { output ->
            output.outputFileName.set("Autu-Mandu_${android.defaultConfig.versionName}.apk")
        }
    }
}

dependencies {
    // --- AndroidX & Support ---
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.appcompat:appcompat:1.8.0-alpha01'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.recyclerview:recyclerview:1.4.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'androidx.fragment:fragment:1.8.9'
    implementation 'androidx.documentfile:documentfile:1.1.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'androidx.work:work-runtime:2.11.2'
    implementation 'androidx.preference:preference:1.2.1'

    // --- UI & Material Design ---
    implementation 'com.google.android.material:material:1.14.0-beta01'
    implementation 'com.github.clans:fab:1.6.4'
    implementation 'com.github.Dhaval2404:ColorPicker:2.3'

    // --- Data & Persistence ---
    implementation 'androidx.room:room-runtime:2.8.4'
    annotationProcessor 'androidx.room:room-compiler:2.8.4'

    // --- Utils & Network ---
    implementation 'com.squareup.okhttp3:okhttp:5.3.2'
    implementation 'org.apache.commons:commons-csv:1.14.1'
    implementation 'net.danlew:android.joda:2.14.1'

    // --- External Charts & UI ---
    implementation 'com.github.gudatcomputers:hellocharts-android:ba603174d302931c0985afb4e54d597fba28146b'
    implementation 'com.bignerdranch.android:recyclerview-multiselect:0.2'
    implementation 'de.psdev.licensesdialog:licensesdialog:2.2.0'

    // --- Testing ---
    androidTestImplementation 'androidx.annotation:annotation:1.9.1'
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test:core:1.7.0'
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
}
